# Starship Prompt Configuration for Windows
# https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$git_state\
$cmd_duration\
$line_break\
$character"""

right_format = """
$nodejs\
$python\
$rust\
$golang\
$java\
$time"""

add_newline = true

[os]
disabled = false
style = "bold blue"

[os.symbols]
Macos = " "
Windows = "󰍲 "
Linux = " "

[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)[@](dimmed white)"
disabled = false
show_always = false

[directory]
style = "bold cyan"
read_only = " 󰌾"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
# Windows path separator
home_symbol = "~"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"
windows_starship = "C:/Program Files/starship/bin/starship.exe"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol${pyenv_prefix}(${version})(\($virtualenv\))]($style) '

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version)]($style) "

[java]
symbol = " "
style = "bold red"
format = "[$symbol($version)]($style) "

[time]
disabled = false
style = "bold bright-black"
format = "[$time]($style)"
time_format = "%H:%M"
